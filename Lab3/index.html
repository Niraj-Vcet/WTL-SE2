<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top nav-custom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Portfolio</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a href="#home" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="#features" class="nav-link">Features</a></li>
        <li class="nav-item"><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section id="home" class="hero d-flex align-items-center text-center">
  <div class="container">
    <h1 class="fw-bold">Welcome to My Page</h1>
    <p class="lead">Landing Page using CSS3 & Bootstrap</p>
    <a href="#features" class="btn btn-main">Explore</a>
  </div>
</section>

<!-- FEATURES -->
<section id="features" class="py-5">
  <div class="container text-center">
    <h2 class="mb-4">Features</h2>

    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="box">
          <h4>Responsive</h4>
          <p>Works on all devices</p>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="box">
          <h4>Simple UI</h4>
          <p>Clean and easy design</p>
        </div>
      </div>

      <div class="col-md-4 mb-3">
        <div class="box">
          <h4>Modern</h4>
          <p>Attractive layout</p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact py-5">
  <div class="container text-center">
    <h2 class="mb-4">Contact</h2>

    <form class="mx-auto form-box">
      <input type="text" class="form-control mb-3" placeholder="Name" required>
      <input type="email" class="form-control mb-3" placeholder="Email" required>

      <button class="btn btn-main w-100">Submit</button>
    </form>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer text-center text-white py-3">
  <p class="mb-0">© 2026 Portfolio</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
